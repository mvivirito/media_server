services:
  sabnzbd:
    image: lscr.io/linuxserver/sabnzbd:latest
    container_name: sabnzbd
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
    volumes:
      - ${CONFIG_BASE}/sabnzbd:/config
      - /volume2/Downloads:/downloads
      - /volume3/Warehouse-2/library/Uncategorized:/library
    ports:
      - 8080:8080
    restart: unless-stopped
    networks:
      - media-net

  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
    volumes:
      - ${CONFIG_BASE}/radarr:/config
      - /volume2/Downloads:/downloads
      - /volume2/Warehouse-1/movies:/movies
    ports:
      - 7878:7878
    depends_on:
      - sabnzbd
      - nzbhydra2
    restart: unless-stopped
    networks:
      - media-net

  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
    volumes:
      - ${CONFIG_BASE}/sonarr:/config
      - /volume2/Downloads:/downloads
      - /volume3/Warehouse-2/tv:/tv
    ports:
      - 8989:8989
    depends_on:
      - sabnzbd
      - nzbhydra2
    restart: unless-stopped
    networks:
      - media-net

  nzbhydra2:
    image: lscr.io/linuxserver/nzbhydra2:latest
    container_name: nzbhydra2
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
    volumes:
      - ${CONFIG_BASE}/nzbhydra2:/config
      - /volume2/Downloads:/downloads
    ports:
      - 5076:5076
    restart: unless-stopped
    networks:
      - media-net

  profilarr:
    image: santiagosayshey/profilarr:latest
    container_name: profilarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
    volumes:
      - ${CONFIG_BASE}/profilarr:/config
    ports:
      - 6868:6868
    depends_on:
      - radarr
      - sonarr
    networks:
      - media-net
    restart: unless-stopped

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    environment:
      - TUNNEL_TOKEN=${TOKEN}
    command: tunnel --no-autoupdate run
    volumes:
      - ${CONFIG_BASE}/cloudflared:/home/nonroot/.cloudflared
    restart: unless-stopped
    networks:
      - media-net

networks:
  media-net:
    driver: bridge
    external: true
