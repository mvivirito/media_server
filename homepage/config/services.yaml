# Homepage services — https://gethomepage.dev/configs/services/
# Widget `url` uses container names (all on media-net); `href` is the LAN Caddy
# URL for click-through. API keys are pulled from Portainer env as
# {{HOMEPAGE_VAR_*}} — the dashboard renders without them, just no live stats.

- Media:
    - Sonarr:
        icon: sonarr.png
        href: https://sonarr.home.mvivirito.com
        description: TV automation
        widget:
          type: sonarr
          url: http://sonarr:8989
          key: "{{HOMEPAGE_VAR_SONARR_KEY}}"
    - Radarr:
        icon: radarr.png
        href: https://radarr.home.mvivirito.com
        description: Movie automation
        widget:
          type: radarr
          url: http://radarr:7878
          key: "{{HOMEPAGE_VAR_RADARR_KEY}}"
    - SABnzbd:
        icon: sabnzbd.png
        href: https://sab.home.mvivirito.com
        description: Usenet downloader
        widget:
          type: sabnzbd
          url: http://sabnzbd:8080
          key: "{{HOMEPAGE_VAR_SABNZBD_KEY}}"
    - Bazarr:
        icon: bazarr.png
        href: http://10.0.0.108:6767
        description: Subtitles
        widget:
          type: bazarr
          url: http://bazarr:6767
          key: "{{HOMEPAGE_VAR_BAZARR_KEY}}"

- Playback:
    - Emby:
        icon: emby.png
        href: https://emby.mvivirito.com
        description: Media server
        widget:
          type: emby
          url: http://10.0.0.108:8096   # adjust to your Emby host/port
          key: "{{HOMEPAGE_VAR_EMBY_KEY}}"
    - NZBHydra2:
        icon: nzbhydra2.png
        href: https://hydra.home.mvivirito.com
        description: Indexer search

- Books:
    - BookLore:
        icon: mdi-book-open-page-variant
        href: http://10.0.0.108:6060
        description: eBook library
    - Profilarr:
        icon: mdi-tune-variant
        href: http://10.0.0.108:6868
        description: Quality profiles

- Infrastructure:
    - Grafana:
        icon: grafana.png
        href: https://grafana.home.mvivirito.com
        description: Metrics + dashboards
    - Portainer:
        icon: portainer.png
        href: https://portainer.home.mvivirito.com
        description: Containers
    - NAS (ADM):
        icon: mdi-nas
        href: https://nas.home.mvivirito.com
        description: Asustor ADM
