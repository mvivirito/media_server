# Homepage services — https://gethomepage.dev/configs/services/
# Widget `url` uses container names; `href` uses {{HOMEPAGE_VAR_DOMAIN}} and
# {{HOMEPAGE_VAR_NAS}}, both set as env vars at deploy time (never committed).
# API keys come from {{HOMEPAGE_VAR_*}} too — tiles render without them.

- Media:
    - Sonarr:
        icon: sonarr.png
        href: https://sonarr.home.{{HOMEPAGE_VAR_DOMAIN}}
        description: TV automation
        widget:
          type: sonarr
          url: http://sonarr:8989
          key: "{{HOMEPAGE_VAR_SONARR_KEY}}"
    - Radarr:
        icon: radarr.png
        href: https://radarr.home.{{HOMEPAGE_VAR_DOMAIN}}
        description: Movie automation
        widget:
          type: radarr
          url: http://radarr:7878
          key: "{{HOMEPAGE_VAR_RADARR_KEY}}"
    - SABnzbd:
        icon: sabnzbd.png
        href: https://sab.home.{{HOMEPAGE_VAR_DOMAIN}}
        description: Usenet downloader
        widget:
          type: sabnzbd
          url: http://sabnzbd:8080
          key: "{{HOMEPAGE_VAR_SABNZBD_KEY}}"
    - Bazarr:
        icon: bazarr.png
        href: https://bazarr.home.{{HOMEPAGE_VAR_DOMAIN}}
        description: Subtitles
        widget:
          type: bazarr
          url: http://bazarr:6767
          key: "{{HOMEPAGE_VAR_BAZARR_KEY}}"

- Playback:
    - Emby:
        icon: emby.png
        href: https://emby.{{HOMEPAGE_VAR_DOMAIN}}
        description: Media server
        widget:
          type: emby
          url: http://{{HOMEPAGE_VAR_NAS}}:8096
          key: "{{HOMEPAGE_VAR_EMBY_KEY}}"
    - NZBHydra2:
        icon: nzbhydra2.png
        href: https://hydra.home.{{HOMEPAGE_VAR_DOMAIN}}
        description: Indexer search
    - Profilarr:
        icon: mdi-tune-variant
        href: https://profilarr.home.{{HOMEPAGE_VAR_DOMAIN}}
        description: Quality profiles

- Infrastructure:
    - Grafana:
        icon: grafana.png
        href: https://grafana.home.{{HOMEPAGE_VAR_DOMAIN}}
        description: Metrics + dashboards
    - Portainer:
        icon: portainer.png
        href: https://portainer.home.{{HOMEPAGE_VAR_DOMAIN}}
        description: Containers
    - NAS:
        icon: mdi-nas
        href: https://nas.home.{{HOMEPAGE_VAR_DOMAIN}}
        description: NAS admin
