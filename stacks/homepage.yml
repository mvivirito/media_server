# Homepage — dashboard (gethomepage.dev). The config lives in homepage/config/.
# Deploy maps /app/config to ${CONFIG_BASE}/homepage; seed it from this repo.
# Site-specific values (domain, host, widget keys) are env vars set at deploy
# time — nothing site-specific is committed. The config references them as
# {{HOMEPAGE_VAR_*}}; the compose must name each one to reach the container.
services:
  homepage:
    image: ghcr.io/gethomepage/homepage:latest
    container_name: homepage
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
      - HOMEPAGE_ALLOWED_HOSTS=${HOMEPAGE_ALLOWED_HOSTS:-}
      - HOMEPAGE_VAR_DOMAIN=${HOMEPAGE_VAR_DOMAIN:-}
      - HOMEPAGE_VAR_NAS=${HOMEPAGE_VAR_NAS:-}
      - HOMEPAGE_VAR_SONARR_KEY=${HOMEPAGE_VAR_SONARR_KEY:-}
      - HOMEPAGE_VAR_RADARR_KEY=${HOMEPAGE_VAR_RADARR_KEY:-}
      - HOMEPAGE_VAR_SABNZBD_KEY=${HOMEPAGE_VAR_SABNZBD_KEY:-}
      - HOMEPAGE_VAR_BAZARR_KEY=${HOMEPAGE_VAR_BAZARR_KEY:-}
      - HOMEPAGE_VAR_EMBY_KEY=${HOMEPAGE_VAR_EMBY_KEY:-}
    volumes:
      - ${CONFIG_BASE}/homepage:/app/config
    ports:
      - 3000:3000
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    networks:
      - media-net

networks:
  media-net:
    driver: bridge
    external: true
