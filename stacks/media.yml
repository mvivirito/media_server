# Media automation stack — the Usenet download/organize pipeline.
# Deploy as a Portainer stack. Requires the external `media-net` bridge and the
# CONFIG_BASE env var (+ TOKEN for the optional cloudflared tunnel).
services:
  sabnzbd:
    image: lscr.io/linuxserver/sabnzbd:latest
    container_name: sabnzbd
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
    volumes:
      - ${CONFIG_BASE}/sabnzbd:/config
      - /volume2/Downloads:/downloads
      - /volume3/Warehouse-2/library/Uncategorized:/library
    ports:
      - 8080:8080
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    networks:
      - media-net

  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
    volumes:
      - ${CONFIG_BASE}/radarr:/config
      - /volume2/Downloads:/downloads
      - /volume2/Warehouse-1/movies:/movies
    ports:
      - 7878:7878
    depends_on:
      - sabnzbd
      - nzbhydra2
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    networks:
      - media-net

  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
    volumes:
      - ${CONFIG_BASE}/sonarr:/config
      - /volume2/Downloads:/downloads
      - /volume3/Warehouse-2/tv:/tv
    ports:
      - 8989:8989
    depends_on:
      - sabnzbd
      - nzbhydra2
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    networks:
      - media-net

  nzbhydra2:
    image: lscr.io/linuxserver/nzbhydra2:latest
    container_name: nzbhydra2
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
    volumes:
      - ${CONFIG_BASE}/nzbhydra2:/config
      - /volume2/Downloads:/downloads
    ports:
      - 5076:5076
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    networks:
      - media-net

  profilarr:
    image: santiagosayshey/profilarr:latest
    container_name: profilarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
    volumes:
      - ${CONFIG_BASE}/profilarr:/config
    ports:
      - 6868:6868
    depends_on:
      - radarr
      - sonarr
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    networks:
      - media-net

  bazarr:
    image: lscr.io/linuxserver/bazarr:latest
    container_name: bazarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
    volumes:
      - ${CONFIG_BASE}/bazarr:/config
      - /volume2/Warehouse-1/movies:/movies
      - /volume3/Warehouse-2/tv:/tv
    ports:
      - 6767:6767
    depends_on:
      - radarr
      - sonarr
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    networks:
      - media-net

  # Media server. Config under CONFIG_BASE rides the same offsite backup job
  # as the other apps. Library volumes mount at their HOST paths on purpose:
  # the migrated database references absolute paths, so mirroring them means
  # zero library re-pathing. /dev/dri passthrough = QuickSync transcode (the
  # render node is kept alive by the nas-metrics sidecar).
  emby:
    image: lscr.io/linuxserver/emby:latest
    container_name: emby
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
    volumes:
      - ${CONFIG_BASE}/emby:/config
      - /volume2/Warehouse-1:/volume2/Warehouse-1:ro
      - /volume3/Warehouse-2:/volume3/Warehouse-2:ro
      # host /tmp is tmpfs: transcode segments in RAM instead of the HDD
      # mirror — snappier seeks, especially with subtitle burn-in, and less
      # churn on volume1. Set the path in Emby: Transcoding -> /transcode
      - /tmp/emby-transcode:/transcode
    devices:
      - /dev/dri:/dev/dri
    ports:
      - 8096:8096
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    networks:
      - media-net
      # edge-net: shared with cloudflared only, so the tunnel process can
      # reach Emby but nothing else in the stack (tunnel-pivot containment)
      - edge-net

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    environment:
      - TUNNEL_TOKEN=${TOKEN}
    command: tunnel --no-autoupdate run
    volumes:
      - ${CONFIG_BASE}/cloudflared:/home/nonroot/.cloudflared
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    networks:
      # deliberately NOT on media-net: the tunnel connector only ever needs
      # the service it publishes (emby), never the rest of the stack
      - edge-net

networks:
  media-net:
    driver: bridge
    external: true
  edge-net:
    driver: bridge
    external: true
