# Monitoring — Prometheus node_exporter for the host.
# Standalone Portainer stack (no media-net dependency): exposes host metrics on
# :9100 for a Prometheus scraper. Needs host networking + host PID + the root
# filesystem mounted read-only so it reports the real host, not the container.
services:
  node-exporter:
    image: quay.io/prometheus/node-exporter:latest
    container_name: node-exporter
    command:
      - '--path.rootfs=/host'
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--web.listen-address=:9100'
      - '--collector.filesystem.mount-points-exclude=^/(host/)?(sys|proc|dev|host|etc)($|/)'
    network_mode: host
    pid: host
    volumes:
      # plain :ro (private) — the NAS root is not a shared/slave mount, so
      # rslave propagation is rejected by its Docker daemon.
      - /:/host:ro
    restart: always
    read_only: true
    security_opt:
      - no-new-privileges:true
